name: Google Indexing Ping

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Ping Google Indexing API
        run: |
          npx tsx scripts/ping-google.ts \
          https://activesports.live \
          https://activesports.live/fixtures \
          https://activesports.live/leagues \
          https://activesports.live/teams \
          https://activesports.live/players \
          https://activesports.live/world-cup \
          https://activesports.live/stats/leaders
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
