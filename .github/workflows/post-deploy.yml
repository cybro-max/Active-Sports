name: Post-Deploy
on:
  deployment_status:
    states: [success]

jobs:
  warm-and-submit:
    if: github.event.deployment_status.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Warm ISR cache
        run: npx tsx scripts/warm-cache.ts
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://activesports.live' }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
